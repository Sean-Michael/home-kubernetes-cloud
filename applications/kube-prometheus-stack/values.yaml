# Grafana configuration
grafana:
  enabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folder: /tmp/dashboards
      searchNamespace: ALL
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  # Tailnet-only: reached via the Istio gateway + Tailscale Ingress, not nginx.
  ingress:
    enabled: false
  # Behind the tailnet hostname Grafana must generate absolute URLs (login redirect,
  # OAuth, asset paths) against its real external host, not the in-cluster name.
  grafana.ini:
    server:
      root_url: https://grafana.tail4dd976.ts.net
      serve_from_sub_path: false

# Prometheus configuration
prometheus:
  # Tailnet-only: reached via the Istio gateway + Tailscale Ingress, not nginx.
  ingress:
    enabled: false
  prometheusSpec:
    retention: 7d
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Alertmanager configuration
alertmanager:
  # Tailnet-only: reached via the Istio gateway + Tailscale Ingress, not nginx.
  ingress:
    enabled: false
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# Node exporter for host metrics
nodeExporter:
  enabled: true

# Prometheus operator
prometheusOperator:
  enabled: true

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

