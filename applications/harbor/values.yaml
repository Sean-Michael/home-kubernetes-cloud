# Tailnet-only: external access is via the Istio Gateway + Tailscale Ingress
# (harbor.tail4dd976.ts.net). TLS is terminated by the Tailscale proxy, so Harbor
# itself speaks plain HTTP behind the gateway, but externalURL must be https so the
# token service and docker client use the correct scheme.
externalURL: https://harbor.tail4dd976.ts.net

expose:
  # clusterIP: no nginx Ingress; the harbor-core/harbor-portal services are still
  # created and are fronted by the shared Istio caliban-gateway HTTPRoute.
  type: clusterIP
  tls:
    enabled: false

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: local-path
      size: 10Gi
    jobservice:
      jobLog:
        storageClass: local-path
        size: 1Gi
    database:
      storageClass: local-path
      size: 5Gi
    redis:
      storageClass: local-path
      size: 1Gi
    trivy:
      storageClass: local-path
      size: 5Gi

database:
  type: internal

redis:
  type: internal

trivy:
  enabled: true

metrics:
  enabled: true
  core:
    path: /metrics
    port: 8001
  registry:
    path: /metrics
    port: 8001
  jobservice:
    path: /metrics
    port: 8001
  exporter:
    path: /metrics
    port: 8001
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

cache:
  enabled: true
  expireHours: 24

updateStrategy:
  type: Recreate
