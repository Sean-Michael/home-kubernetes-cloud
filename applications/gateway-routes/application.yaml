apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-routes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sean-Michael/home-kubernetes-cloud.git
    targetRevision: HEAD
    path: applications/gateway-routes/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
