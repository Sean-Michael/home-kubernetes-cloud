# TEMPLATE ONLY — do not commit a filled-in copy (real secrets are gitignored).
#
# Create the real secret out-of-band before ArgoCD syncs the operator:
#
#   kubectl create namespace tailscale --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic operator-oauth -n tailscale \
#     --from-literal=client_id='<OAUTH_CLIENT_ID>' \
#     --from-literal=client_secret='<OAUTH_CLIENT_SECRET>'
#
# Generate the OAuth client at: https://login.tailscale.com/admin/settings/oauth
#   Scopes (write): "Devices Core", "Auth Keys", "Services"
#   Assign tag:    tag:k8s-operator
apiVersion: v1
kind: Secret
metadata:
  name: operator-oauth
  namespace: tailscale
type: Opaque
stringData:
  client_id: "REPLACE_ME"
  client_secret: "REPLACE_ME"
