apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
spec:
  project: default
  source:
    # Standard-channel Gateway API CRDs straight from upstream (no vendoring).
    # Pinned to a release within Istio 1.30's supported Gateway API range.
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.3.0
    path: config/crd/standard
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
