apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ambient-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/Sean-Michael/home-kubernetes-cloud.git
    targetRevision: HEAD
    path: applications/istio
    directory:
      include: ambient-namespaces.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      # Manage only the label; don't fight CreateNamespace from app syncs.
      - ServerSideApply=true
